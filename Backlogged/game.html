<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Backlogged</title>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="css/style.css" />
        <script src="js/game.js" defer></script>
    </head>

    <body>
        <header>
            <a href="index.html" id="site-logo">Backlogged</a>
            <nav aria-label="Primary">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="backlog.html">My Backlog</a></li>
                    <li><a href="add.html">Log Game</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div id="game-page">
                <section id="game-details">
                    <h1 id="game-title"></h1>
                    <img id="game-cover" src="" alt="Game cover" />
                    <p id="game-description"></p>
                    <p id="game-release-date"></p>
                </section>
                
                <article id="personal-review">
                    <h2>My Log</h2>
                    
                    <div id="display-status">
                        <span>Status:</span>
                        <span id="status-value"></span>
                    </div>

                    <div id="display-excitement">
                        <span>Excitement:</span>
                        <span id="excitement-value"></span>
                    </div>

                    <div id="display-expected-rating">
                        <span>Expected Rating:</span>
                        <span id="expected-rating-value"></span>
                    </div>

                    <div id="display-rating">
                        <span>Rating:</span>
                        <span id="rating-value"></span>
                    </div>

                    <div id="display-hours">
                        <span>Hours Played:</span>
                        <span id="hours-value"></span>
                    </div>

                    <div id="display-review">
                        <span>Review:</span>
                        <p id="review-value"></p>
                    </div>

                    <div id="display-drop-reason">
                        <span>Drop Reason:</span>
                        <p id="drop-reason-value"></p>
                    </div>

                    <button id="edit-button">Edit Entry</button>
                    <button id="delete-button">Delete Game</button>
                </article>
            </div>
        </main>

        <footer>
            <p>Backlogged - Track your Gaming Journey!</p>
        </footer>
    </body>
</html>

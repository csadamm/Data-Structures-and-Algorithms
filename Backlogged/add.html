<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Backlogged</title>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="css/style.css" />
        <script src="js/add.js" defer></script>
    </head>

    <body>
        <header>
            <a href="index.html" id="site-logo">Backlogged</a>
            <nav aria-label="Primary">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="backlog.html">My Backlog</a></li>
                    <li><a href="add.html" aria-current="page">Log Game</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <h1 class="page-title">Log a Game</h1>
            <p id="form-error"></p>

            <form id="add-game-form">

                <div>
                    <label for="game-title">Game Title</label>
                    <input type="text" id="game-title" name="game-title" placeholder="Search for a game..."/>
                    <div id="search-results"></div>
                </div>

                <!-- Cover image will be produced by RAWG API later -->

                <div>
                    <label for="game-status">Status</label>
                    <select id="game-status" name="game-status">
                        <option value="Wishlist">Wishlist</option>
                        <option value="Current">Currently Playing</option>
                        <option value="Finished">Finished</option>
                        <option value="Dropped">Dropped</option>
                    </select>
                </div>

                <div>
                    <label for="excitement">Excitement to Play (1–10)</label>
                    <input type="number" id="excitement" name="excitement" min="1" max="10" placeholder="1"/>
                </div>

                <div>
                    <label for="expected-rating">Expected rating (1-5)</label>
                    <input type="number" id="expected-rating" name="expected-rating" min="1" max="5" placeholder="1"/>
                </div>

                <div>
                    <label for="hours">Hours Played</label>
                    <input type="number" id="hours" name="hours" min="0" placeholder="0"/>
                </div>

                <div>
                    <label for="rating">Your Rating (1–5)</label>
                    <input type="number" id="rating" name="rating" min="1" max="5" placeholder="1"/>
                </div>

                <div>
                    <label for="drop-reason">Drop Reason</label>
                    <textarea id="drop-reason" name="drop-reason" placeholder="Why did you drop it?"></textarea>
                </div>

                <div>
                    <label for="review">Review</label>
                    <textarea id="review" name="review" placeholder="Write your review..."></textarea>
                </div>

                <button type="submit">Log Game</button>

            </form>
        </main>

        <footer>
            <p>Backlogged - Track your Gaming Journey!</p>
        </footer>
    </body>
</html>

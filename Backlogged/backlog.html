<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Backlogged</title>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="css/style.css" />
        <script src="js/backlog.js" defer></script>
    </head>

    <body>
        <header>
            <a href="index.html" id="site-logo">Backlogged</a>
            <nav aria-label="Primary">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="backlog.html" aria-current="page">My Backlog</a></li>
                    <li><a href="add.html">Log Game</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div id="backlog-header">
                <h1>My Backlog</h1>

                <div id="controls">
                    <div id="filter-options">
                        <label><input type="checkbox" value="Wishlist" checked />Wishlist</label>
                        <label><input type="checkbox" value="Current" checked />Currently Playing</label>
                        <label><input type="checkbox" value="Finished" checked />Finished</label>
                        <label><input type="checkbox" value="Dropped" checked />Dropped</label>
                    </div>

                    <select id="sort-order">
                        <option value="by-last">By Last Modified</option>
                        <option value="by-first">By First Added</option>
                        <option value="by-excitement-descending">By Excitement (Descending)</option>
                        <option value="by-excitement-ascending">By Excitement (Ascending)</option>
                        <option value="by-rating-descending">By Rating (Descending)</option>
                        <option value="by-rating-ascending">By Rating (Ascending)</option>
                        <option value="by-date-newest">By Release Date (Newest to Oldest)</option>
                        <option value="by-date-oldest">By Release Date (Oldest to Newest)</option>
                    </select>
                </div>
            </div>

            <div id="game-list">
                <!-- Games will be rendered here by JavaScript -->
            </div>
        </main>

        <footer>
            <p>Backlogged - Track your Gaming Journey!</p>
        </footer>
    </body>
</html>
